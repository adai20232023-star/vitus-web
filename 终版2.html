<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>鸭梨不山大 · 梨梨与鸭鸭</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: #FFFDF9;
      min-height: 100vh;
      color: #5e4b3a;
      display: flex;
      flex-direction: column;
    }

    .menu {
      background: rgba(255, 248, 240, 0.96);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0.8rem 2rem;
      border-bottom: 1px solid #ffe0d0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: bold;
      background: linear-gradient(135deg, #cfa392, #b87a64);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .menu ul { display: flex; gap: 2rem; list-style: none; flex-wrap: wrap; }
    .menu li {
      font-size: 1.1rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 40px;
      transition: 0.2s;
      color: #b97f6e;
    }
    .menu li:hover, .menu li.active { background: #fae6da; color: #8c5a48; }

    .music-icon {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      background: #fef4ea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 200;
      transition: 0.2s;
      border: 1px solid #cfa392;
    }
    .music-icon:hover { transform: scale(1.05); background: #fae6da; }

    .tab-content { display: none; animation: fadeIn 0.3s; }
    .tab-content.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main {
      flex: 1;
      max-width: 1300px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      width: 100%;
    }

    #home {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 200px);
    }
    #home::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url("鸭梨首页图.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.22;
      z-index: -2;
      pointer-events: none;
    }

    .tab-content:not(#home) {
      background-image: url("11.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      border-radius: 28px;
      margin-bottom: 30px;
    }
    .tab-content:not(#home)::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 253, 249, 0.88);
      border-radius: 28px;
      pointer-events: none;
      z-index: 0;
    }
    .tab-content:not(#home) > * {
      position: relative;
      z-index: 1;
    }

    .welcome-box,
    .story-container,
    .free-buttons,
    #freeCanvasContainer,
    .book-container,
    .knowledge-video,
    .knowledge-list,
    .card-3d-container,
    .message-wall,
    .temp-vertical {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 28px;
      border: 1px solid #f0cfbd;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      backdrop-filter: blur(2px);
      padding: 1.5rem;
    }

    .welcome-box {
      text-align: center;
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
    }
    .welcome-box h1 { font-size: 2.2rem; color: #cfa392; }
    .quote-of-day {
      margin: 1rem auto;
      background: #fef4ea;
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-style: italic;
    }
    .mode-selector {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .mode-btn {
      background: #fae6da;
      border: none;
      padding: 1.2rem 1.8rem;
      border-radius: 2rem;
      font-size: 1.2rem;
      cursor: pointer;
      min-width: 200px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .mode-btn:hover { background: #e2c2b2; transform: scale(1.02); }

    .comic-stage {
      width: 100%;
      height: 500px;
      position: relative;
      background: #f7f3eb;
      border-radius: 1.5rem;
      overflow: hidden;
      cursor: pointer;
    }
    .comic-bg { width: 100%; height: 100%; object-fit: contain; display: block; }
    .bubble-lili, .bubble-yaya {
      position: absolute;
      bottom: 22px;
      background: rgba(255,255,255,0.96);
      padding: 10px 16px;
      border-radius: 18px;
      font-size: 14px;
      max-width: 42%;
      display: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .bubble-lili { left: 22px; }
    .bubble-yaya { right: 22px; }
    .comic-tip {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      pointer-events: none;
    }
    .continue-overlay { position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; z-index: 40; }
    .continue-btn {
      background: #cfa392;
      color: white;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
    }
    #continueAfterInteractionBtn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: none;
      background: #cfa392;
      padding: 10px 24px;
      border-radius: 60px;
      font-size: 1rem;
    }
    .ending-board {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,252,247,0.2);
      backdrop-filter: blur(2px);
      z-index: 20;
    }
    .ending-card {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem;
      text-align: center;
      max-width: 90%;
      width: 500px;
    }
    .story-progress { text-align: center; margin-top: 0.8rem; font-size: 0.8rem; color: #b97f6e; }

    .free-buttons { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .free-interact-btn {
      background: #cfa392;
      border: none;
      color: white;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
    }
    #freeCanvasContainer { min-height: 300px; text-align: center; padding: 1rem; }

    .book-container { perspective: 1800px; max-width: 760px; margin: 0 auto; }
    .book { position: relative; width: 100%; height: 520px; transform-style: preserve-3d; }
    .book-cover, .book-inner {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      box-shadow: 0 12px 28px rgba(0,0,0,0.2);
    }
    .book-cover {
      transform-origin: left center;
      background: linear-gradient(145deg, #b58b5b, #8b5a2b);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: transform 0.85s cubic-bezier(0.2,0.9,0.4,1.1);
      border-left: 16px solid #5a3a1a;
    }
    .book-cover-inner {
      background: rgba(250,245,220,0.95);
      padding: 1.5rem;
      border-radius: 16px;
      width: 80%;
      text-align: center;
    }
    .book-inner {
      transform: rotateY(180deg);
      background: #fef3e2;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: transform 0.85s cubic-bezier(0.2,0.9,0.4,1.1);
      padding: 1rem;
    }
    .book-container.open .book-cover { transform: rotateY(-165deg); }
    .book-container.open .book-inner { transform: rotateY(0deg); }
    .oracle-input {
      width: 260px;
      padding: 10px;
      border-radius: 40px;
      border: 1px solid #f0cfbd;
      text-align: center;
      margin-top: 12px;
    }
    .oracle-result {
      background: white;
      border-radius: 24px;
      padding: 1.2rem;
      font-size: 1.2rem;
      line-height: 1.5;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .flip-page-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
    .flip-page {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #fff9ef;
      transform-origin: left center;
      opacity: 0;
      animation: pageFlipFast 0.1s ease forwards;
    }
    @keyframes pageFlipFast {
      0% { transform: rotateY(0deg); opacity: 0.9; }
      100% { transform: rotateY(-170deg); opacity: 0; }
    }

    .knowledge-layout {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .knowledge-left { flex: 2; min-width: 240px; }
    .knowledge-video { margin-bottom: 1.5rem; text-align: center; }
    .knowledge-video iframe {
      width: 100%;
      max-width: 560px;
      height: 315px;
      border-radius: 1rem;
    }
    .knowledge-list { display: grid; gap: 1rem; }
    .knowledge-card {
      background: #fffcf7;
      border-left: 6px solid #cfa392;
      padding: 0.8rem 1rem;
      border-radius: 1rem;
      font-size: 0.9rem;
    }
    .temp-vertical {
      flex: 0.9;
      min-width: 200px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      padding: 0.5rem;
    }
    .temp-vertical label {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 12px;
      color: #b87a64;
    }
    .temp-slider-wrapper {
      width: 100%;
      padding: 10px 0;
    }
    input[type=range].temp-slider {
      -webkit-appearance: none;
      width: 80%;
      height: 12px;
      background: linear-gradient(90deg, #42a5f5, #ffb74d, #ef5350);
      border-radius: 10px;
      outline: none;
      margin: 20px 0;
    }
    input[type=range].temp-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px;
      height: 26px;
      background: white;
      border-radius: 50%;
      border: 2px solid #cfa392;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: 0.1s;
    }
    input[type=range].temp-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    .temp-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #cfa392;
      margin: 8px 0;
    }
    #tempResponse {
      background: rgba(255,255,240,0.8);
      border-radius: 48px;
      padding: 10px 18px;
      font-size: 1rem;
      margin-top: 12px;
      font-weight: 500;
      backdrop-filter: blur(2px);
    }

    .split-card-layout {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      align-items: center;
    }
    .card-display-area {
      flex: 1.5;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .card-wrapper {
      width: 320px;
      height: 460px;
      perspective: 1000px;
      margin-bottom: 20px;
    }
    .card3d {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
    }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1.2rem;
    }
    .card-back {
      background: url("卡片封面.png") center/cover no-repeat;
      transform: rotateY(0deg);
    }
    .card-front {
      background: #fffcf7;
      transform: rotateY(180deg);
      overflow-y: auto;
      justify-content: center;
    }
    .story-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #cfa392;
      margin-bottom: 16px;
      text-align: center;
    }
    .story-text {
      font-size: 0.95rem;
      line-height: 1.5;
      text-align: center;
      max-height: 280px;
      overflow-y: auto;
      padding: 0 8px;
    }
    .draw-btn-area {
      margin-top: 16px;
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 10;
    }
    .draw-btn-area .continue-btn, .save-card-btn {
      background: #cfa392;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .draw-btn-area .continue-btn:hover, .save-card-btn:hover {
      background: #b87a64;
      transform: translateY(-2px);
    }
    .save-card-btn { background: #b0c4a2; }
    .prescription-area {
      flex: 1;
      min-width: 220px;
      background: #fef4ea;
      border-radius: 28px;
      padding: 1.2rem;
      text-align: center;
      align-self: center;
    }
    .prescription-area h3 { font-size: 1.4rem; color: #b87a64; margin-bottom: 1rem; }
    .prescription-item { font-size: 1rem; margin: 1rem 0; background: white; border-radius: 40px; padding: 8px; }

    .bubble-cloud {
      position: relative;
      width: 100%;
      height: 460px;
      background: #fef9f0;
      border-radius: 32px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid #ffe0a3;
    }
    .floating-bubble {
      position: absolute;
      background: white;
      border-radius: 60px;
      padding: 6px 16px;
      font-size: 0.9rem;
      border: 1px solid #cfa392;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 260px;
      word-break: break-word;
      animation: floatUp linear forwards;
      cursor: default;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.9); opacity: 0; }
      10% { opacity: 1; transform: translateY(-8px) scale(1); }
      90% { opacity: 1; transform: translateY(-85%) scale(1); }
      100% { transform: translateY(-100%) scale(0.95); opacity: 0; visibility: hidden; }
    }
    .message-input-area {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .message-input {
      flex: 1;
      max-width: 400px;
      padding: 8px 16px;
      border-radius: 60px;
      border: 1px solid #f0cfbd;
    }
    .submit-message { background: #cfa392; color: white; border: none; padding: 8px 20px; border-radius: 60px; cursor: pointer; }

    .footer-credit {
      text-align: center;
      font-size: 0.7rem;
      color: #b97f6e;
      padding: 1rem;
      border-top: 1px solid #f0cfbd;
      background: rgba(255, 248, 240, 0.8);
      width: 100%;
    }

    @media (max-width: 800px) {
      .knowledge-layout { flex-direction: column; }
      .temp-vertical { width: 100%; margin-top: 1rem; }
      .split-card-layout { flex-direction: column; align-items: stretch; }
      .prescription-area { margin-top: 20px; }
      .menu ul { gap: 1rem; flex-wrap: wrap; justify-content: center; }
    }

    .tab-content > h2,
    .tab-content > h2:first-child {
      display: none;
    }
  </style>
</head>
<body>
<nav class="menu">
  <div class="logo">鸭梨不山大</div>
  <ul>
    <li data-tab="home" class="active">首页</li>
    <li data-tab="oracle">答案之书</li>
    <li data-tab="knowledge">疗愈知识</li>
    <li data-tab="card">心灵抽卡</li>
    <li data-tab="message">留言墙</li>
  </ul>
</nav>
<div id="musicIcon" class="music-icon">🔇</div>

<main>
  <section id="home" class="tab-content active">
    <div class="welcome-box">
      <h1>🌸 梨梨与鸭鸭的治愈探险</h1>
      <div class="quote-of-day" id="dailyQuote">加载中...</div>
      <p>选择一种方式，开始你的心灵之旅</p>
      <div class="mode-selector">
        <button id="modeStoryBtn" class="mode-btn">📖 故事模式</button>
        <button id="modeFreeBtn" class="mode-btn">🎮 自由探索</button>
      </div>
    </div>
  </section>

  <section id="storyMode" class="tab-content">
    <div class="story-container">
      <div class="comic-stage" id="comicStage">
        <img id="comicBgImg" class="comic-bg" src="">
        <div class="bubble-lili" id="bLili"></div>
        <div class="bubble-yaya" id="bYaya"></div>
        <div class="comic-tip" id="comicTip"></div>
        <div class="continue-overlay" id="continueOverlay" style="display:none;">
          <button id="continueSceneBtn" class="continue-btn">➡️ 继续</button>
        </div>
        <div class="ending-board" id="endingBoard">
          <div class="ending-card">
            <h3>❤️ 故事结束</h3>
            <p>谢谢你和梨梨、鸭鸭一起走到这里。</p>
            <div class="ending-actions">
              <button id="restartStoryBtn" class="continue-btn">重新体验</button>
              <button id="goToFreeBtn" class="continue-btn">自由探索</button>
            </div>
          </div>
        </div>
      </div>
      <button id="continueAfterInteractionBtn" style="display: none;">✅ 完成交互，继续故事</button>
      <div class="story-progress" id="storyProgress">场景 1 / 33</div>
    </div>
  </section>

  <section id="freeMode" class="tab-content">
    <div class="free-buttons">
      <button class="free-interact-btn" data-interaction="1">吹蒲公英</button>
      <button class="free-interact-btn" data-interaction="2">拨毛线琴弦</button>
      <button class="free-interact-btn" data-interaction="3">乱码开花</button>
      <button class="free-interact-btn" data-interaction="4">海浪冲烦恼</button>
    </div>
    <div id="freeCanvasContainer"><p>点击上方按钮，打开疗愈小游戏</p></div>
  </section>

  <section id="oracle" class="tab-content">
    <div class="book-container" id="bookContainer">
      <div class="book">
        <div class="book-cover">
          <div class="book-cover-inner">
            <h3>📖 答案之书</h3>
            <p>写下你的问题</p>
            <input type="text" id="oracleInput" class="oracle-input" placeholder="例如：明天会更好吗？">
            <button id="askOracleBtn" class="oracle-btn" style="margin-top:12px;">翻开答案</button>
          </div>
        </div>
        <div class="book-inner">
          <div class="oracle-result-panel">
            <div id="oracleResult" class="oracle-result"></div>
            <div class="share-buttons" id="oracleShareButtons" style="display:none; margin-top:12px;">
              <button id="copyOracleBtn">复制答案</button>
              <button id="saveOracleBtn">保存图片</button>
              <button id="resetOracleBtn" class="oracle-restart">再问一次</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="knowledge" class="tab-content">
    <div class="knowledge-layout">
      <div class="knowledge-left">
        <div class="knowledge-video">
          <iframe src="https://player.bilibili.com/player.html?bvid=BV19XB5BoEPU&page=1&high_quality=1" frameborder="0" allowfullscreen></iframe>
          <p>正念呼吸练习</p>
        </div>
        <div class="knowledge-list" id="knowledgeList"></div>
        <button id="refreshKnowledge" class="continue-btn" style="margin-top:1rem;">换一批知识</button>
      </div>
      <div class="temp-vertical">
        <label>🌡️ 情绪温度计</label>
        <div class="temp-slider-wrapper">
          <input type="range" id="tempSlider" class="temp-slider" min="0" max="100" value="30">
        </div>
        <div class="temp-value" id="tempValue">30°</div>
        <div id="tempResponse"></div>
      </div>
    </div>
  </section>

  <section id="card" class="tab-content">
    <div class="split-card-layout">
      <div class="card-display-area">
        <div class="card-wrapper"><div id="card3d" class="card3d"></div></div>
        <div class="draw-btn-area">

function setBackground(imgUrl) { comicBgImg.src = imgUrl; comicBgImg.style.display = 'block'; }
function showBubble(text, speaker) {
  const el = speaker === 'yaya' ? bYaya : bLili;
  const other = speaker === 'yaya' ? bLili : bYaya;
  other.style.display = 'none';
  el.innerHTML = text.replace(/\n/g,'<br>');
  el.style.display = 'block';
}
function hideBubble() { bLili.style.display = 'none'; bYaya.style.display = 'none'; }
function stopCurrentInteraction() { waitingForInteraction = false; continueAfterInteractionBtn.style.display = 'none'; }
function resetUI() { hideBubble(); continueOverlay.style.display = 'none'; endingBoard.style.display = 'none'; continueAfterInteractionBtn.style.display = 'none'; comicTip.innerText = ''; }
function showComicFrame() {
  const frame = comicStory[currentComicIndex];
  if (!frame) return;
  endingBoard.style.display = 'none';
  setBackground(frame.bg);
  if (!frame.interaction) {
    if (frame.speaker && frame.text) showBubble(frame.text, frame.speaker);
    else hideBubble();
  } else hideBubble();
  comicTip.innerText = frame.tip || "";
  storyProgressSpan.innerText = `场景 ${currentComicIndex+1} / ${comicStory.length}`;
  if (frame.interaction && !waitingForInteraction) startInteraction(frame);
  else if (!frame.interaction && !waitingForInteraction) continueOverlay.style.display = 'block';
}
function startInteraction(frame) {
  waitingForInteraction = true;
  continueAfterInteractionBtn.style.display = 'inline-block';
  continueAfterInteractionBtn.onclick = () => {
    if (!waitingForInteraction) return;
    waitingForInteraction = false;
    continueAfterInteractionBtn.style.display = 'none';
    if (currentComicIndex+1 < comicStory.length) { currentComicIndex++; showComicFrame(); }
    else showEnding();
  };
  let url = "";
  if (frame.interaction===1) url="蒲公英.html";
  else if (frame.interaction===2) url="毛线.html";
  else if (frame.interaction===3) url="花朵.html";
  else if (frame.interaction===4) url="海浪.html";
  if (url) { alert("即将打开交互页面。完成交互后，请关闭该标签页，然后点击“继续故事”按钮。"); window.open(url, "_blank"); }
}
function showEnding() {
  stopCurrentInteraction();
  setBackground(getBgPath("10"));
  hideBubble();
  comicTip.innerText = '';
  continueOverlay.style.display = 'none';
  endingBoard.style.display = 'flex';
  continueAfterInteractionBtn.style.display = 'none';

}
continueSceneBtn.addEventListener('click', () => {

function buildFlipPages(count) {
  const deck = document.createElement('div'); deck.className = 'flip-page-layer';

    page.style.animationDelay = `${i*0.035}s`;

  document.querySelector('.book-inner').appendChild(deck);
  setTimeout(() => deck.remove(), count*35+200);

function initCardRing() {
  card3dDiv.innerHTML = '';
  for (let i=0;i<3;i++) {
    let card = document.createElement('div');
    card.className = 'card3d-single';
    card.style.position = 'absolute';
    card.style.width = '100%';
    card.style.height = '100%';
    card.style.transform = `rotateY(${i*120}deg) translateZ(160px)`;
    card.style.transformStyle = 'preserve-3d';
    card.innerHTML = `<div class="card-face card-back"></div><div class="card-face card-front"></div>`;
    card3dDiv.appendChild(card);
  }
  card3dDiv.style.transformStyle = 'preserve-3d';
  saveCardBtnEl.style.display = 'none';
}
function updatePrescription(doTxt, dontTxt) {
  document.getElementById('doText').innerText = doTxt;
  document.getElementById('dontText').innerText = dontTxt;
}
function showSingleCard(story) {
  card3dDiv.innerHTML = '';
  const sc = document.createElement('div');
  sc.className = 'card-face card-front';
  sc.style.position = 'relative';
  sc.style.width = '100%';
  sc.style.height = '100%';
  sc.style.transform = 'none';
  sc.style.backfaceVisibility = 'visible';
  sc.style.borderRadius = '22px';
  sc.style.display = 'flex';
  sc.style.flexDirection = 'column';
  sc.style.justifyContent = 'center';
  sc.style.padding = '1rem';
  sc.style.overflowY = 'auto';
  sc.innerHTML = `<div class="story-title">${story.title}</div><div class="story-text">${story.story}</div>`;
  card3dDiv.appendChild(sc);
  saveCardBtnEl.style.display = 'inline-block';
  drawRes.innerHTML = '✨ 卡片已翻转 ✨';
  updatePrescription(story.doPres, story.dontPres);
}
function performDraw() {
  if (spinning) return;
  spinning = true;
  saveCardBtnEl.style.display = 'none';
  drawCardBtn.disabled = true;
  const idx = Math.floor(Math.random() * deepStories.length);
  const selected = deepStories[idx];
  const fronts = card3dDiv.querySelectorAll('.card-front');
  for (let f of fronts) f.innerHTML = `<div class="story-title">${selected.title}</div><div class="story-text">${selected.story}</div>`;
  const start = performance.now();
  const duration = 1800;
  function animate(now) {
    let t = Math.min(1, (now-start)/duration);
    let angle = 360*3*t*t;
    card3dDiv.style.transform = `rotateY(${angle}deg)`;
    if (t<1) requestAnimationFrame(animate);
    else { showSingleCard(selected); spinning=false; drawCardBtn.disabled=false; }
  }
  requestAnimationFrame(animate);
}

let bubblePool = [...realMessages];
function createBubble(text, startYPercent = null) {
  if (!text.trim()) return;
  const container = document.getElementById('bubbleCloud');
  const bubble = document.createElement('div');
  bubble.className = 'floating-bubble';
  bubble.innerText = text;
  bubble.style.left = (5 + Math.random() * 85) + '%';
  let bottomStart = startYPercent !== null ? startYPercent : (Math.random() * 60 + 10);
  bubble.style.bottom = bottomStart + '%';
  const duration = 7 + Math.random() * 5;
  bubble.style.animationDuration = `${duration}s`;
  const delay = Math.random() * 1.2;
  bubble.style.animationDelay = `${delay}s`;
  bubble.style.fontSize = `${0.8 + Math.random()*0.6}rem`;
  container.appendChild(bubble);
  bubble.addEventListener('animationend', () => bubble.remove());
}
for (let i=0;i<24;i++) {
  setTimeout(() => {
    let msg = bubblePool[Math.floor(Math.random() * bubblePool.length)];
    createBubble(msg, Math.random() * 70 + 10);
  }, i * 200);
}
setInterval(() => {
  if (document.getElementById('message').classList.contains('active')) {
    let msg = bubblePool[Math.floor(Math.random() * bubblePool.length)];

}, 3500);

  document.getElementById('messageInput').value = '';
});

// ========== 导航切换（滚动到顶部） ==========
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(section => {
    section.classList.remove('active');
  });
  const target = document.getElementById(tabId);
  if (target) target.classList.add('active');
  document.querySelectorAll('.menu li').forEach(li => {
    li.classList.remove('active');
    if (li.getAttribute('data-tab') === tabId) li.classList.add('active');
  });
  // 滚动到顶部，让新页面出现在视口顶部
  setTimeout(() => {
    window.scrollTo(0, 0);
  }, 20);
}
document.querySelectorAll('.menu li').forEach(li => {
  li.addEventListener('click', (e) => {
    const tabId = li.getAttribute('data-tab');
    switchTab(tabId);
  });
});
document.getElementById('modeStoryBtn').addEventListener('click', () => switchTab('storyMode'));
document.getElementById('modeFreeBtn').addEventListener('click', () => switchTab('freeMode'));

window.scrollTo(0, 0);
